<!-- CONTENU -->

<div class="content">


<h1>Gestion des rendez-vous</h1>



<form id="rdvForm">


<input 
type="text" 
id="patientRdv" 
placeholder="Nom du patient"
required>



<input 
type="date" 
id="dateRdv"
required>



<input 
type="time" 
id="heureRdv"
required>



<select id="serviceRdv">


<option value="">
-- Choisir un service --
</option>


<option>
Consultation générale
</option>


<option>
Pédiatrie
</option>


<option>
Laboratoire
</option>


<option>
Dentisterie
</option>


</select>



<button type="submit">

Enregistrer le rendez-vous

</button>


</form>




<h2>Liste des rendez-vous</h2>



<table>


<thead>

<tr>

<th>N°</th>

<th>Patient</th>

<th>Date</th>

<th>Heure</th>

<th>Service</th>

<th>Action</th>


</tr>


</thead>



<tbody id="listeRdv">


</tbody>



</table>



</div>


<script src="script.js"></script>


</body>

</html>
